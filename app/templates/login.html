<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — LINE Task Server</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #f5f7fa;
      color: #1e2432;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 36px 32px;
      margin: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .brand {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .3px;
      margin-bottom: 4px;
      color: #1e2432;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      color: #6b7280;
      letter-spacing: .3px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #1e2432;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    .error {
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.25);
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .btn-primary {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e2432;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: 6px;
    }
    .btn-primary:hover {
      background: #374151;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">LINE Task Server</div>
    <div class="subtitle">管理画面</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="field">
        <label for="username">ユーザー名</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required/>
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-primary">ログイン</button>
    </form>
  </div>
</body>
</html>
