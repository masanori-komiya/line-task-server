<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "LINE Task Server" }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f5f7fa; color: #1e2432; }
    a { color: inherit; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 18px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #e5e7eb; }
    .brand { font-weight: 900; letter-spacing: .3px; color: #1e2432; }
    .btn { display:inline-block; padding: 7px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #ffffff; text-decoration:none; margin-left: 6px; color: #374151; font-size: 13px; }
    .btn:hover { background: #f3f4f6; }
    .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .card-h { padding: 12px 16px; font-weight: 700; border-bottom: 1px solid #e5e7eb; background: #f9fafb; font-size: 14px; color: #374151; }
    .card-b { padding: 16px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 900px){ .grid{ grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #e5e7eb; text-align: left; vertical-align: top; }
    th { font-size: 12px; letter-spacing: .5px; text-transform: uppercase; color: #9ca3af; background: #f9fafb; }
    .muted { color: #6b7280; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    input, textarea, select { width:100%; padding: 9px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #ffffff; color: #1e2432; font-size: 13px; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    textarea { min-height: 80px; resize: vertical; }
    label { font-size: 12px; color: #6b7280; display:block; margin-bottom: 5px; font-weight: 500; }
    .row { display:flex; flex-direction: column; gap: 12px; }
    .row2 { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .actions { display:flex; justify-content:flex-end; margin-top: 8px; }
    .chip { display:inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid #e5e7eb; background: #f3f4f6; font-size: 12px; color: #374151; }
    .avatar { border-radius: 50%; border: 2px solid #e5e7eb; }
    .tablewrap { overflow:auto; }
    button.btn { cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">LINE Task Server</div>
      <div>
          {% block top_right %}{% endblock %}
        <form method="post" action="/admin/logout" style="display:inline">
          <button type="submit" class="btn" style="cursor:pointer;">ログアウト</button>
        </form>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
